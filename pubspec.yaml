name: helpwave
description: helpwave helps ensure that everyone can register at an emergency room that is appropriate for their accident
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.2 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.17.0

  cupertino_icons: ^1.0.2
  flutter_osm_plugin: ^0.40.3
  provider: ^6.0.3
  shared_preferences: ^2.0.15
  flutter_native_splash: ^2.2.11
  flutter_launcher_icons: ^0.10.0
  openapi_generator_annotations: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  openapi_generator: ^4.0.0
  build_runner: ^2.3.2

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/

flutter_native_splash:
  color: "#1B1B1B"
  image: assets/splash/splash.png

  android_12:
    color: "#1B1B1B"
    image: assets/splash/android12splash.png


flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: assets/icon/icon_launcher.png
  adaptive_icon_background: assets/icon/icon_background.png
  adaptive_icon_foreground: assets/icon/icon_launcher.png
